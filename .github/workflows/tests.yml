name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-22.04
    name: Frappe v15 + ERPNext v15 (Python 3.10)

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports: ["3306:3306"]
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-retries=10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=5s

    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: qbo_coa_sync

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install bench
        run: |
          pip install --upgrade pip
          pip install frappe-bench

      - name: Init bench + install Frappe v15 + ERPNext v15
        run: |
          bench init --skip-redis-config-generation --skip-assets --frappe-branch version-15 frappe-bench
          cd frappe-bench
          bench get-app --branch version-15 erpnext
          bench get-app ${{ github.workspace }}/qbo_coa_sync

      - name: Create test site + install apps
        working-directory: frappe-bench
        run: |
          bench new-site test_site \
            --mariadb-root-password root \
            --admin-password admin \
            --no-mariadb-socket
          bench --site test_site install-app erpnext
          bench --site test_site install-app qbo_coa_sync
          bench --site test_site migrate

      - name: Run app tests
        working-directory: frappe-bench
        run: |
          bench --site test_site run-tests --app qbo_coa_sync
